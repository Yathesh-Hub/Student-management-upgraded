<!DOCTYPE html>
<html>
<head>
  <title>Student Portal - Sign Up</title>
  <link rel="icon" type="image/png" href="img/logo.png">
  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f3f3f3;
      font-family: Arial, sans-serif;
      opacity: 1;
      transition: opacity 0.8s ease-in-out;
    }

    body.fade-out {
      opacity: 0;
    }

    .login-box {
      display: grid;
      width: 300px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      gap: 10px;
    }

    label {
      font-weight: bold;
    }

    input {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .password-box {
      position: relative;
      width: 100%;
    }

    .password-box input {
      width: 100%;
      padding: 10px 40px 10px 10px;
      box-sizing: border-box;
    }

    .eye-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      cursor: pointer;
      opacity: 0.7;
    }

    .eye-icon:hover {
      opacity: 1;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    a {
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      color: blueviolet;
      text-decoration: underline;
    }

    .alert {
      display: none;
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
    }

    .alert.success {
      background: #e6ffe6;
      color: #2e7d32;
    }

    .alert.error {
      background: #ffe6e6;
      color: #c62828;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <div id="signupMsg" class="alert"></div>

    <label>Name</label>
    <input id="name" type="text">

    <label>Email</label>
    <input id="email" type="text">

    <label>Password</label>
    <div class="password-box">
      <input id="Password" type="password">
      <img src="Eye img/hide.png" class="eye-icon" onclick="togglePassword('Password', this)" alt="Show password">
    </div>

    <label>Confirm Password</label>
    <div class="password-box">
      <input id="confirmPassword" type="password">
      <img src="Eye img/hide.png" class="eye-icon" onclick="togglePassword('confirmPassword', this)" alt="Show password">
    </div>

    <button onclick="signup()">Sign Up</button>
    <a onclick="goSlow('login.html')">Already have an account?</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
