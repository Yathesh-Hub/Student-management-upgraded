<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <img src="img/logo.png" alt="Logo" class="auth-logo">
                <h1>Student Management System</h1>
                <p>Sign in to your account</p>
            </div>

            <div id="alertMessage" class="alert" style="display: none;"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                        <button type="button" class="toggle-password" onclick="togglePasswordLogin()">
                            <img id="eyeIconLogin" src="Eye img/hide.png" alt="Toggle password">
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html" onclick="event.preventDefault(); goSlow('signup.html')">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="scripts/config.js"></script>
    <script src="scripts/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            await login();
        });
    </script>
</body>
</html>
